<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>教室使用情况查询 · 快捷跳转</title>
    <style>
        /* ---------- 基础变量定义 (亮色模式默认) ---------- */
        :root {
            /* 背景渐变 */
            --bg-gradient-start: #e9f0f5;
            --bg-gradient-end: #d9e2ec;
            /* 主卡片容器背景 */
            --dashboard-bg: rgba(255, 255, 255, 0.65);
            --dashboard-backdrop: blur(2px);
            /* 文字主色 */
            --text-title-gradient-start: #1a3c5c;
            --text-title-gradient-end: #2b5a7a;
            --text-subtitle: #2c3e4e;
            --text-footer: #2c5a7a;
            /* 卡片相关 */
            --card-bg: linear-gradient(135deg, #ffffff 0%, #fefefe 100%);
            --card-border: rgba(70, 130, 200, 0.2);
            --card-shadow: 0 8px 18px rgba(0, 0, 0, 0.05);
            --card-hover-border: rgba(46, 125, 160, 0.5);
            --card-hover-shadow: 0 22px 32px -12px rgba(0, 32, 64, 0.2);
            /* 图标背景 */
            --icon-bg: #eef3fc;
            --icon-hover-bg: #d9e9ff;
            /* 教室名称颜色 */
            --room-name: #1e4663;
            /* 描述标签 */
            --room-desc-bg: #f0f6fe;
            --room-desc-color: #527a9b;
            /* 跳转徽章 */
            --badge-bg: #eef2f7;
            --badge-color: #2c6280;
            --badge-hover-bg: #1e4663;
            --badge-hover-color: white;
            /* 底部装饰 */
            --footer-bg: rgba(255, 255, 240, 0.6);
            --header-border: rgba(43, 90, 122, 0.2);
        }

        /* ---------- 深色模式变量覆盖 (prefers-color-scheme) ---------- */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-gradient-start: #121826;
                --bg-gradient-end: #1a1f2e;
                --dashboard-bg: rgba(18, 24, 38, 0.75);
                --dashboard-backdrop: blur(3px);
                --text-title-gradient-start: #9ac7e7;
                --text-title-gradient-end: #c0e0ff;
                --text-subtitle: #bcd0e6;
                --text-footer: #9bb8d4;
                --card-bg: linear-gradient(135deg, #1e2638 0%, #1a212f 100%);
                --card-border: rgba(100, 160, 220, 0.3);
                --card-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
                --card-hover-border: rgba(120, 180, 240, 0.7);
                --card-hover-shadow: 0 22px 32px -12px rgba(0, 0, 0, 0.6);
                --icon-bg: #252e3f;
                --icon-hover-bg: #2f3b50;
                --room-name: #d6eaff;
                --room-desc-bg: #232b3b;
                --room-desc-color: #b8d0e8;
                --badge-bg: #2a3448;
                --badge-color: #c6defa;
                --badge-hover-bg: #3e6b8f;
                --badge-hover-color: #ffffff;
                --footer-bg: rgba(20, 28, 40, 0.7);
                --header-border: rgba(120, 170, 220, 0.25);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            padding: 1.5rem;
            transition: background 0.2s ease;
        }

        .dashboard {
            max-width: 1400px;
            width: 100%;
            background: var(--dashboard-bg);
            backdrop-filter: var(--dashboard-backdrop);
            border-radius: 3rem;
            padding: 2rem 1.8rem 2.5rem 1.8rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35), 0 2px 6px rgba(0, 0, 0, 0.05);
            transition: background 0.2s ease, backdrop-filter 0.2s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 2.8rem;
        }

        .header h1 {
            font-size: 2.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-title-gradient-start), var(--text-title-gradient-end));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-block;
            padding: 0 0.5rem;
        }

        .header p {
            color: var(--text-subtitle);
            font-size: 1rem;
            font-weight: 500;
            margin-top: 0.7rem;
            opacity: 0.85;
            border-top: 2px solid var(--header-border);
            display: inline-block;
            padding-top: 0.6rem;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.8rem;
            margin: 0.5rem 0 1rem;
        }

        .classroom-card {
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 1.8rem 1.2rem;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid var(--card-border);
            box-shadow: var(--card-shadow);
            cursor: pointer;
        }

        .classroom-card:hover {
            transform: translateY(-8px);
            border-color: var(--card-hover-border);
            box-shadow: var(--card-hover-shadow);
        }

        .card-icon {
            background: var(--icon-bg);
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 35px;
            margin-bottom: 1.4rem;
            transition: 0.2s;
            font-size: 2.5rem;
        }

        .classroom-card:hover .card-icon {
            background: var(--icon-hover-bg);
            transform: scale(1.02);
        }

        .room-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--room-name);
            margin-bottom: 0.5rem;
            letter-spacing: -0.2px;
        }

        .room-desc {
            font-size: 0.85rem;
            color: var(--room-desc-color);
            margin-bottom: 1rem;
            font-weight: 500;
            background: var(--room-desc-bg);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            display: inline-block;
        }

        .goto-badge {
            margin-top: 0.8rem;
            font-size: 0.8rem;
            font-weight: 600;
            background: var(--badge-bg);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            color: var(--badge-color);
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .classroom-card:hover .goto-badge {
            background: var(--badge-hover-bg);
            color: var(--badge-hover-color);
            gap: 10px;
        }

        .footer-note {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.8rem;
            color: var(--text-footer);
            background: var(--footer-bg);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 0.5rem 1.3rem;
            border-radius: 60px;
            backdrop-filter: blur(2px);
        }

        @media (max-width: 680px) {
            .dashboard {
                padding: 1.5rem;
            }
            .header h1 {
                font-size: 1.7rem;
            }
            .room-name {
                font-size: 1.3rem;
            }
            .card-grid {
                gap: 1.2rem;
            }
        }

        .classroom-card:active {
            transform: scale(0.98);
            transition: 0.05s;
        }

        @media (prefers-color-scheme: dark) {
            ::-webkit-scrollbar {
                width: 8px;
                height: 8px;
            }
            ::-webkit-scrollbar-track {
                background: #1e2538;
                border-radius: 10px;
            }
            ::-webkit-scrollbar-thumb {
                background: #3a4a6e;
                border-radius: 10px;
            }
            ::-webkit-scrollbar-thumb:hover {
                background: #5a7ca8;
            }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1>📚 教室使用情况查询</h1>
        <p>选择教学楼 · 实时查看占用状态</p>
    </div>

    <div class="card-grid" id="cardGrid"></div>

    <div class="footer-note">
        ⚡ 点击任意教室卡片，跳转至对应的「教室使用情况查询」系统
    </div>
</div>

<script>
    (function() {
        // ============================================================
        // 数据配置区：只需在这里维护教室信息，即可自动生成所有卡片
        // 添加/删除/修改链接，只需编辑这个数组，无需改动其他代码
        // ============================================================
        const classrooms = [
            {
                name: "第一教学楼",
                desc: "东区",
                icon: "🏫",
                url: "https://bigscreen.cmet.ustc.edu.cn/#/1"
            },
            {
                name: "第二教学楼",
                desc: "东区",
                icon: "🏫",
                url: "https://bigscreen.cmet.ustc.edu.cn/#/2"
            },
            {
                name: "第三教学楼",
                desc: "西区",
                icon: "🏫",
                url: "https://bigscreen.cmet.ustc.edu.cn/#/3"
            },
            {
                name: "第五教学楼",
                desc: "东区",
                icon: "🏫",
                url: "https://bigscreen.cmet.ustc.edu.cn/#/5"
            },
            {
                name: "艺术教学中心",
                desc: "中区",
                icon: "🎨",
                url: "https://bigscreen.cmet.ustc.edu.cn/#/9"
            },
            {
                name: "图书教育中心A楼",
                desc: "高新区",
                icon: "📕️",
                url: "https://bigscreen.cmet.ustc.edu.cn/#/11"
            },
            {
                name: "图书教育中心B楼",
                desc: "高新区",
                icon: "📗",
                url: "https://bigscreen.cmet.ustc.edu.cn/#/12"
            },
            {
                name: "图书教育中心C楼",
                desc: "高新区",
                icon: "📘️",
                url: "https://bigscreen.cmet.ustc.edu.cn/#/13"
            },
            {
                name: "师生活动中心",
                desc: "高新区",
                icon: "🎼",
                url: "https://bigscreen.cmet.ustc.edu.cn/#/14"
            },
            {
                name: "2号学科楼",
                desc: "高新区",
                icon: "🏫",
                url: "https://bigscreen.cmet.ustc.edu.cn/#/15"
            },
            {
                name: "3号学科楼",
                desc: "高新区",
                icon: "🏫",
                url: "https://bigscreen.cmet.ustc.edu.cn/#/16"
            },
            {
                name: "信智楼",
                desc: "高新区",
                icon: "🖥️",
                url: "https://bigscreen.cmet.ustc.edu.cn/#/22"
            }
        ];

        // 获取容器元素
        const cardGrid = document.getElementById('cardGrid');

        // 如果没有容器，退出
        if (!cardGrid) return;

        // 动态生成所有卡片 (高效、可维护)
        function generateCards() {
            // 使用 DocumentFragment 减少 DOM 重绘次数，提升性能
            const fragment = document.createDocumentFragment();

            classrooms.forEach((room, index) => {
                // 创建 <a> 标签作为卡片
                const card = document.createElement('a');
                card.className = 'classroom-card';
                card.href = room.url;  // 设置真实链接，支持右键复制链接
                card.setAttribute('data-url', room.url);

                // 构建卡片内部 HTML
                card.innerHTML = `
                    <div class="card-icon">${room.icon}</div>
                    <div class="room-name">${escapeHtml(room.name)}</div>
                    <div class="room-desc">${escapeHtml(room.desc)}</div>
                    <div class="goto-badge">
                        <span>📖 查询使用情况 →</span>
                    </div>
                `;

                // 绑定点击事件（新标签页打开）
                card.addEventListener('click', (e) => {
                    e.preventDefault();  // 阻止默认跳转（但保留 href 供右键使用）
                    window.open(room.url, '_blank', 'noopener,noreferrer');
                });

                fragment.appendChild(card);
            });

            // 一次性将所有卡片添加到容器
            cardGrid.appendChild(fragment);
        }

        // 简单的防XSS辅助函数（对教室名称和描述进行转义）
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // 执行生成
        generateCards();

        console.log(`✅ 已动态生成 ${classrooms.length} 个教室查询卡片 | 支持深色模式自适应`);
    })();
</script>
</body>
</html>
